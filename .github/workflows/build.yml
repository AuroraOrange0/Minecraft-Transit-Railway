name: Build
on: [ push, workflow_dispatch ]

jobs:
  build:
    name: Build Minecraft
    runs-on: ubuntu-latest
    env:
      BUILD_ARTIFACTS: ${{ secrets.BUILD_ARTIFACTS }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@main
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@main
      - name: Setup JDK 26
        uses: actions/setup-java@main
        with:
          java-version: 26
          distribution: 'temurin'
          cache: gradle
      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew
      - name: Setup website files
        run: ./gradlew setupWebsiteFiles --no-daemon
      - name: Setup Node
        uses: actions/setup-node@main
        with:
          node-version: 24
      - name: Install Node packages
        run: npm ci --prefix website
      - name: Build Angular
        run: npm run build --prefix website
      - name: Setup files
        run: ./gradlew setupFiles -PcrowdinApiKey="${{ secrets.CROWDIN_API_KEY }}" -PpatreonApiKey="${{ secrets.PATREON_API_KEY }}" --no-daemon
      - name: Build
        run: ./gradlew buildAndCollect --no-daemon
      - name: Capture release artifacts
        if: env.BUILD_ARTIFACTS == 'true'
        uses: actions/upload-artifact@main
        with:
          name: Minecraft Transit Railway
          path: build/release/
